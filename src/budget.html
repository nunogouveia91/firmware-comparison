<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Orçamento</title>
<style>
:root {
  --bg:#0f1117; --surface:#181b27; --surface2:#1f2336; --border:#2a2f4a;
  --accent:#4f8ef7; --text:#dde3f0; --muted:#7a849a;
  --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px}

/* ── Views ── */
.view{position:fixed;inset:0;bottom:var(--nav-h);overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.view.active{display:block}

/* ── Onboarding ── */
#view-onboarding{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:40px 28px;bottom:0}
#view-onboarding h1{font-size:2.2rem;font-weight:800;color:var(--accent)}
#view-onboarding p{color:var(--muted);text-align:center;line-height:1.5;font-size:.95rem}
.inp-group label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px}
.inp-group{width:100%}
.inp{width:100%;padding:13px 15px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);font-size:1rem;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
select.inp{appearance:none;-webkit-appearance:none;cursor:pointer}
.btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:13px;
  font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-sm{padding:10px 16px;font-size:.88rem;border-radius:10px;width:auto}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-danger{background:var(--danger)}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:10;background:var(--bg);padding:14px 16px 0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr h2{font-size:1.25rem;font-weight:800}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;
  align-items:center;justify-content:center;font-size:.85rem;font-weight:700;cursor:pointer;flex-shrink:0}

/* ── Filters ── */
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.wallet-sel{flex:1;padding:8px 14px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:20px;color:var(--text);font-size:.85rem;outline:none;appearance:none;
  -webkit-appearance:none;cursor:pointer}
.month-chips{display:flex;gap:6px;overflow-x:auto;padding:6px 0 4px;scrollbar-width:none}
.month-chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 13px;border-radius:16px;background:var(--surface);
  border:1.5px solid var(--border);color:var(--muted);font-size:.78rem;cursor:pointer;user-select:none;
  transition:all .15s}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* ── Totals bar ── */
.totals-bar{display:flex;gap:8px;padding:8px 16px 4px;overflow-x:auto;scrollbar-width:none}
.totals-bar::-webkit-scrollbar{display:none}
.total-card{flex-shrink:0;padding:10px 16px;background:var(--surface);border-radius:12px;
  border:1px solid var(--border);text-align:center;min-width:80px}
.total-card .tc-val{font-size:1rem;font-weight:700;color:var(--danger)}
.total-card .tc-lbl{font-size:.7rem;color:var(--muted);margin-top:2px}

/* ── Expense list ── */
.exp-list{padding:8px 16px 84px}
.date-group{margin-bottom:2px}
.date-lbl{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;
  padding:10px 0 5px;display:flex;justify-content:space-between}
.exp-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);
  border-radius:13px;margin-bottom:8px;cursor:pointer;transition:opacity .15s}
.exp-item:active{opacity:.7}
.cat-ic{width:40px;height:40px;border-radius:11px;background:var(--surface2);display:flex;
  align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.exp-meta{flex:1;min-width:0}
.exp-desc{font-size:.95rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-sub{font-size:.76rem;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.wlt-badge{display:inline-block;padding:2px 7px;border-radius:7px;font-size:.68rem;font-weight:700}
.exp-amt{font-size:1rem;font-weight:700;color:var(--danger);flex-shrink:0;white-space:nowrap}
.empty-state{text-align:center;padding:70px 24px;color:var(--muted)}
.empty-state .ei{font-size:3.5rem;margin-bottom:14px}
.empty-state p{font-size:.9rem;line-height:1.6}
.hint{font-size:.72rem;color:var(--muted);text-align:center;padding:6px 0 10px}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--nav-h) + 18px);right:20px;width:58px;height:58px;
  border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.8rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;
  box-shadow:0 4px 24px rgba(79,142,247,.45)}
.fab:active{transform:scale(.93)}

/* ── Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:30;display:none}
.overlay.active{display:block}

/* ── Bottom Sheet ── */
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-radius:22px 22px 0 0;z-index:31;padding:0 20px 32px;max-height:93vh;
  overflow-y:auto;transform:translateY(105%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sheet.open{transform:translateY(0)}
.sh-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 18px}
.sh-title{font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:20px}

/* Amount input */
.amt-wrap{display:flex;align-items:center;gap:10px;background:var(--surface2);
  border-radius:15px;padding:13px 18px;margin-bottom:20px;border:2px solid transparent;transition:border-color .15s}
.amt-wrap:focus-within{border-color:var(--accent)}
.currency{font-size:1.6rem;color:var(--muted);font-weight:800;line-height:1}
.amt-inp{flex:1;background:none;border:none;color:var(--text);font-size:2.2rem;
  font-weight:800;outline:none;width:100%;min-width:0}

/* Form rows */
.form-row{margin-bottom:16px}
.form-lbl{font-size:.8rem;color:var(--muted);margin-bottom:7px;display:block;font-weight:500}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-btn{padding:10px 4px;background:var(--surface2);border:2px solid transparent;
  border-radius:11px;color:var(--text);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:4px;font-size:.68rem;transition:all .12s;line-height:1.2}
.cat-btn .ci{font-size:1.45rem}
.cat-btn.sel{border-color:var(--accent);background:rgba(79,142,247,.12)}

/* Wallet pills */
.wlt-pills{display:flex;flex-wrap:wrap;gap:8px}
.wlt-pill{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:.85rem;cursor:pointer;transition:all .12s;font-weight:500}
.wlt-pill.sel{background:rgba(79,142,247,.12)}

/* ── Nav ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);
  border-top:1px solid var(--border);display:flex;z-index:20}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:var(--muted);font-size:.66rem;font-weight:500;
  border:none;background:none;transition:color .15s}
.nav-item .ni{font-size:1.35rem}
.nav-item.active{color:var(--accent)}
.nav-item:disabled{opacity:.35;cursor:not-allowed}

/* ── Settings ── */
#view-settings{padding-bottom:24px}
.sett-hdr{padding:16px 16px 8px;display:flex;align-items:center;gap:12px}
.sett-hdr h2{font-size:1.2rem;font-weight:800}
.back-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sett-sec{padding:0 16px 14px}
.sett-sec h3{font-size:.75rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:8px;font-weight:600}
.list-card{background:var(--surface);border-radius:13px;overflow:hidden}
.li{display:flex;align-items:center;gap:12px;padding:13px 14px;
  border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}
.li-main{flex:1;min-width:0}
.li-name{font-size:.95rem;font-weight:500}
.li-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.del-btn{width:32px;height:32px;border-radius:9px;border:none;
  background:rgba(239,68,68,.1);color:var(--danger);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-row{padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap}
.add-row .inp{padding:9px 12px;font-size:.9rem;flex:1;min-width:80px}
.add-row .btn-add{padding:9px 16px;background:var(--accent);border:none;border-radius:9px;
  color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;white-space:nowrap}
.color-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.group-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:600}
.group-basic{background:rgba(79,142,247,.15);color:#4f8ef7}
.group-saving{background:rgba(34,197,94,.15);color:#22c55e}
.group-free{background:rgba(245,158,11,.15);color:#f59e0b}

/* ── Budget view ── */
.bgt-card{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:12px;
  border:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.bgt-card:active{opacity:.75}
.bgt-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.bgt-card-label{font-size:1rem;font-weight:800}
.bgt-card-desc{font-size:.75rem;color:var(--muted);margin-top:2px}
.bgt-card-spent{font-size:1.15rem;font-weight:800}
.bgt-card-limit{font-size:.72rem;color:var(--muted);margin-top:3px}
.bgt-bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bgt-bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bgt-summary{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:16px;
  border:1px solid var(--border)}
.cat-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;
  border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.bgt-sec-title{font-size:.75rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin:18px 0 8px;font-weight:600}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(var(--nav-h)+14px);left:50%;
  transform:translateX(-50%) translateY(18px);background:var(--surface2);
  border:1px solid var(--border);border-radius:11px;padding:10px 20px;
  font-size:.85rem;opacity:0;transition:all .25s;z-index:99;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ══ Onboarding ══════════════════════════════════════════════════════════ -->
<div id="view-onboarding" class="view active">
  <div style="font-size:3.5rem">💰</div>
  <h1>Orçamento</h1>
  <p>Regista as tuas despesas e controla o teu orçamento. Simples e rápido.</p>
  <div class="inp-group">
    <label for="ob-name">Como te chamas?</label>
    <input id="ob-name" class="inp" type="text" placeholder="O teu nome" autocomplete="given-name">
  </div>
  <button class="btn" onclick="setupUser()">Começar →</button>
</div>

<!-- ══ Registo ════════════════════════════════════════════════════════════ -->
<div id="view-main" class="view">
  <div class="hdr">
    <div class="hdr-row">
      <h2>Registo</h2>
      <div class="avatar" id="avatar-btn" onclick="goSettings()">U</div>
    </div>
    <div class="filter-bar">
      <select class="wallet-sel" id="wallet-filter" onchange="applyFilters()">
        <option value="">Todas as carteiras</option>
      </select>
    </div>
    <div class="month-chips" id="month-chips"></div>
  </div>
  <div class="totals-bar" id="totals-bar"></div>
  <div class="exp-list" id="exp-list"></div>
</div>

<!-- ══ Orçamento ════════════════════════════════════════════════════════ -->
<div id="view-budget" class="view">
  <div class="hdr">
    <div class="hdr-row">
      <h2>Orçamento</h2>
      <div class="avatar" id="budget-avatar" onclick="goSettings()">U</div>
    </div>
    <div class="month-chips" id="budget-month-chips"></div>
  </div>
  <div id="budget-content" style="padding:0 16px 84px"></div>
</div>

<!-- ══ Definições ═════════════════════════════════════════════════════════ -->
<div id="view-settings" class="view">
  <div class="sett-hdr">
    <button class="back-btn" onclick="showView('main')">←</button>
    <h2>Definições</h2>
  </div>

  <!-- User -->
  <div class="sett-sec">
    <h3>Utilizador</h3>
    <div class="list-card">
      <div class="li">
        <div class="li-main">
          <input id="sett-name" class="inp" type="text" placeholder="O teu nome"
            style="background:transparent;border:none;padding:0;font-size:.95rem;font-weight:500">
        </div>
        <button class="btn btn-sm" onclick="saveUserName()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Wallets -->
  <div class="sett-sec">
    <h3>Carteiras</h3>
    <div class="list-card">
      <div id="wallets-list"></div>
      <div class="add-row">
        <input id="new-wlt-name" class="inp" type="text" placeholder="Nome da carteira" style="flex:2">
        <input id="new-wlt-color" type="color" value="#4f8ef7"
          style="width:42px;padding:3px;background:var(--surface2);border:1.5px solid var(--border);
          border-radius:9px;cursor:pointer;flex-shrink:0">
        <button class="btn-add" onclick="addWallet()">+</button>
      </div>
    </div>
  </div>

  <!-- Categories -->
  <div class="sett-sec">
    <h3>Categorias</h3>
    <div class="list-card">
      <div id="cats-list"></div>
      <div class="add-row">
        <input id="new-cat-icon" class="inp" type="text" placeholder="🏷️"
          style="width:52px;text-align:center;flex:none">
        <input id="new-cat-name" class="inp" type="text" placeholder="Nome" style="flex:2">
        <select id="new-cat-group" class="inp" style="flex:1;padding:9px 8px">
          <option value="basic">Basic</option>
          <option value="saving">Saving</option>
          <option value="free">Free</option>
        </select>
      </div>
      <div style="padding:0 14px 12px">
        <button class="btn" onclick="addCategory()">Adicionar categoria</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ Bottom Nav ═════════════════════════════════════════════════════════ -->
<nav id="nav">
  <button class="nav-item active" id="nav-main" onclick="showView('main')">
    <span class="ni">💸</span><span>Registo</span>
  </button>
  <button class="nav-item" id="nav-budget" onclick="showView('budget')">
    <span class="ni">📊</span><span>Orçamento</span>
  </button>
  <button class="nav-item" id="nav-sett" onclick="showView('settings')">
    <span class="ni">⚙️</span><span>Definições</span>
  </button>
</nav>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddSheet()" style="display:none">+</button>

<!-- ══ Sheet: Add Expense ══════════════════════════════════════════════════ -->
<div class="overlay" id="ov-add" onclick="closeAddSheet()"></div>
<div class="sheet" id="sh-add">
  <div class="sh-handle"></div>
  <div class="sh-title">Nova Despesa</div>

  <div class="amt-wrap">
    <span class="currency">€</span>
    <input class="amt-inp" id="exp-amount" type="number" inputmode="decimal"
      placeholder="0,00" min="0" step="0.01">
  </div>

  <div class="form-row">
    <label class="form-lbl">Descrição (opcional)</label>
    <input class="inp" id="exp-desc" type="text" placeholder="Ex: Supermercado Continente">
  </div>

  <div class="form-row">
    <label class="form-lbl">Categoria</label>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <div class="form-row">
    <label class="form-lbl">Carteira</label>
    <div class="wlt-pills" id="wlt-pills"></div>
  </div>

  <div class="form-row">
    <label class="form-lbl">Data</label>
    <input class="inp" id="exp-date" type="date">
  </div>

  <button class="btn" onclick="saveExpense()" style="margin-top:6px">Guardar Despesa</button>
</div>

<!-- ══ Sheet: Delete confirm ══════════════════════════════════════════════ -->
<div class="overlay" id="ov-del" onclick="closeDelSheet()"></div>
<div class="sheet" id="sh-del">
  <div class="sh-handle"></div>
  <div class="sh-title">Eliminar despesa?</div>
  <p id="del-desc" style="text-align:center;color:var(--muted);margin-bottom:24px;font-size:.9rem;line-height:1.5"></p>
  <div style="display:flex;gap:10px">
    <button class="btn btn-outline" style="flex:1" onclick="closeDelSheet()">Cancelar</button>
    <button class="btn btn-danger" style="flex:1" onclick="confirmDelete()">Eliminar</button>
  </div>
</div>

<!-- ══ Sheet: Edit Limit ════════════════════════════════════════════════ -->
<div class="overlay" id="ov-limit" onclick="closeLimitSheet()"></div>
<div class="sheet" id="sh-limit">
  <div class="sh-handle"></div>
  <div class="sh-title" id="limit-sheet-title">Limite do grupo</div>
  <div class="amt-wrap">
    <span class="currency">€</span>
    <input class="amt-inp" id="limit-amount" type="number" inputmode="decimal"
      placeholder="0,00" min="0" step="0.01">
  </div>
  <p style="text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:24px;line-height:1.5">
    Define um limite mensal para este grupo.<br>Deixa vazio para sem limite.
  </p>
  <div style="display:flex;gap:10px">
    <button class="btn btn-outline" style="flex:1" onclick="clearLimit()">Sem limite</button>
    <button class="btn" style="flex:1" onclick="saveLimit()">Guardar</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const S = {
  user: null,
  wallets: [],
  categories: [],
  expenses: [],
  selWallet: '',
  selMonths: [],
  selCatId: null,
  selWltId: null,
  deleteId: null,
  budgetMonth: '',
  limits: { basic: null, saving: null, free: null },
};

// ── Utils ─────────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('pt-PT', { style:'currency', currency:'EUR' }).format(n);
const today = () => new Date().toISOString().slice(0, 10);
const currentYM = () => new Date().toISOString().slice(0, 7);

function labelMonth(ym) {
  const [y, m] = ym.split('-');
  return new Date(+y, +m - 1, 1).toLocaleDateString('pt-PT', { month:'short', year:'2-digit' });
}

function labelDate(d) {
  const t = today(), yest = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (d === t) return 'Hoje';
  if (d === yest) return 'Ontem';
  return new Date(d + 'T00:00:00').toLocaleDateString('pt-PT', { weekday:'short', day:'numeric', month:'short' });
}

function initials(name) {
  return (name || 'U').trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function toast(msg, dur = 2400) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function getDeviceId() {
  let id = localStorage.getItem('budget_device_id');
  if (!id) {
    id = 'dev_' + crypto.randomUUID().replace(/-/g, '');
    localStorage.setItem('budget_device_id', id);
  }
  return id;
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const t = await r.text();
    throw new Error(t);
  }
  return r.json();
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const user = await api('GET', `/api/users/${getDeviceId()}`);
    S.user = user;
    await loadData();
    showView('main');
  } catch {
    showView('onboarding');
  }
}

async function setupUser() {
  const name = document.getElementById('ob-name').value.trim();
  if (!name) { toast('Insere o teu nome 👋'); return; }
  S.user = await api('POST', '/api/users', { device_id: getDeviceId(), name });
  await loadData();
  showView('main');
}

async function loadData() {
  const uid = S.user.id;
  S.selMonths = S.selMonths.length ? S.selMonths : [currentYM()];
  [S.wallets, S.categories] = await Promise.all([
    api('GET', `/api/wallets?user_id=${uid}`),
    api('GET', `/api/categories?user_id=${uid}`),
  ]);
  await loadExpenses();
}

async function loadExpenses() {
  let url = `/api/expenses?user_id=${S.user.id}`;
  if (S.selWallet) url += `&wallet_id=${S.selWallet}`;
  for (const m of S.selMonths) url += `&month=${m}`;
  S.expenses = await api('GET', url);
  renderExpenses();
  renderTotals();
}

// ── Views ─────────────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const viewMap = { main:'main', budget:'budget', settings:'settings', onboarding:'onboarding' };
  document.getElementById(`view-${viewMap[name] || 'onboarding'}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const fab = document.getElementById('fab');
  if (name === 'main') {
    document.getElementById('nav-main').classList.add('active');
    fab.style.display = '';
    renderFilters();
    renderExpenses();
    renderTotals();
    updateAvatar();
  } else if (name === 'budget') {
    document.getElementById('nav-budget').classList.add('active');
    fab.style.display = '';
    if (!S.budgetMonth) S.budgetMonth = currentYM();
    loadLimits();
    renderBudget();
  } else if (name === 'settings') {
    document.getElementById('nav-sett').classList.add('active');
    fab.style.display = 'none';
    renderSettings();
  } else {
    fab.style.display = 'none';
  }
}

function goSettings() { showView('settings'); }

function updateAvatar() {
  if (S.user) document.getElementById('avatar-btn').textContent = initials(S.user.name);
}

// ── Filters ───────────────────────────────────────────────────────────────────
function renderFilters() {
  const sel = document.getElementById('wallet-filter');
  sel.innerHTML = '<option value="">Todas as carteiras</option>';
  for (const w of S.wallets) {
    const o = document.createElement('option');
    o.value = w.id; o.textContent = w.name;
    if (w.id == S.selWallet) o.selected = true;
    sel.appendChild(o);
  }

  const chips = document.getElementById('month-chips');
  chips.innerHTML = '';
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const ym = d.toISOString().slice(0, 7);
    const chip = document.createElement('div');
    chip.className = 'chip' + (S.selMonths.includes(ym) ? ' active' : '');
    chip.textContent = labelMonth(ym);
    chip.onclick = () => toggleMonth(ym);
    chips.appendChild(chip);
  }
}

function toggleMonth(ym) {
  const idx = S.selMonths.indexOf(ym);
  if (idx === -1) S.selMonths.push(ym);
  else if (S.selMonths.length > 1) S.selMonths.splice(idx, 1);
  renderFilters();
  loadExpenses();
}

function applyFilters() {
  S.selWallet = document.getElementById('wallet-filter').value;
  loadExpenses();
}

// ── Totals ────────────────────────────────────────────────────────────────────
function renderTotals() {
  const bar = document.getElementById('totals-bar');
  if (!S.expenses.length) { bar.innerHTML = ''; return; }
  const total = S.expenses.reduce((s, e) => s + e.amount, 0);
  const byGroup = {};
  for (const e of S.expenses) {
    const g = e.group_type || 'outros';
    byGroup[g] = (byGroup[g] || 0) + e.amount;
  }
  const labels = { basic:'Basic', saving:'Saving', free:'Free', outros:'Outros' };
  let html = `<div class="total-card"><div class="tc-val">${fmt(total)}</div><div class="tc-lbl">Total</div></div>`;
  for (const [g, v] of Object.entries(byGroup)) {
    html += `<div class="total-card"><div class="tc-val" style="font-size:.92rem">${fmt(v)}</div><div class="tc-lbl">${labels[g] || g}</div></div>`;
  }
  bar.innerHTML = html;
}

// ── Expense List ──────────────────────────────────────────────────────────────
function renderExpenses() {
  const container = document.getElementById('exp-list');
  if (!S.expenses.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="ei">🧾</div>
        <p>Sem despesas no período selecionado.<br>
        Toca no <strong>+</strong> para registar a primeira.</p>
      </div>`;
    return;
  }

  const groups = {};
  for (const e of S.expenses) {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  }

  let html = '';
  for (const [date, exps] of Object.entries(groups)) {
    const dayTotal = exps.reduce((s, e) => s + e.amount, 0);
    html += `<div class="date-group">
      <div class="date-lbl"><span>${labelDate(date)}</span><span>${fmt(dayTotal)}</span></div>`;
    for (const e of exps) {
      const wc = e.wallet_color || '#4f8ef7';
      const desc = escHtml(e.description || e.category_name || 'Despesa');
      html += `<div class="exp-item" onclick="openDelSheet(${e.id},${JSON.stringify(e.description || e.category_name || 'Despesa')},${e.amount})">
        <div class="cat-ic">${e.category_icon || '📦'}</div>
        <div class="exp-meta">
          <div class="exp-desc">${desc}</div>
          <div class="exp-sub">
            <span class="wlt-badge" style="background:${wc}22;color:${wc}">${escHtml(e.wallet_name)}</span>
            ${e.category_name ? `<span>${escHtml(e.category_name)}</span>` : ''}
          </div>
        </div>
        <div class="exp-amt">−${fmt(e.amount)}</div>
      </div>`;
    }
    html += '</div>';
  }
  html += '<div class="hint">💡 Toca numa despesa para eliminar</div>';
  container.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Add Expense Sheet ─────────────────────────────────────────────────────────
function openAddSheet() {
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-desc').value = '';
  document.getElementById('exp-date').value = today();
  S.selCatId = null;
  S.selWltId = S.selWallet ? parseInt(S.selWallet) : (S.wallets[0]?.id ?? null);

  // Category grid
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  for (const cat of S.categories) {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.innerHTML = `<span class="ci">${cat.icon}</span><span>${escHtml(cat.name)}</span>`;
    btn.onclick = () => {
      S.selCatId = cat.id;
      grid.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
    };
    grid.appendChild(btn);
  }

  // Wallet pills
  const pills = document.getElementById('wlt-pills');
  pills.innerHTML = '';
  for (const w of S.wallets) {
    const pill = document.createElement('div');
    pill.className = 'wlt-pill' + (w.id === S.selWltId ? ' sel' : '');
    if (w.id === S.selWltId) pill.style.borderColor = w.color;
    pill.textContent = w.name;
    pill.onclick = () => {
      S.selWltId = w.id;
      pills.querySelectorAll('.wlt-pill').forEach(p => { p.classList.remove('sel'); p.style.borderColor = ''; });
      pill.classList.add('sel');
      pill.style.borderColor = w.color;
    };
    pills.appendChild(pill);
  }

  document.getElementById('ov-add').classList.add('active');
  document.getElementById('sh-add').classList.add('open');
  setTimeout(() => document.getElementById('exp-amount').focus(), 320);
}

function closeAddSheet() {
  document.getElementById('ov-add').classList.remove('active');
  document.getElementById('sh-add').classList.remove('open');
}

async function saveExpense() {
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const desc = document.getElementById('exp-desc').value.trim();
  const date = document.getElementById('exp-date').value;
  if (!amount || amount <= 0) { toast('Insere um valor válido'); return; }
  if (!S.selWltId) { toast('Seleciona uma carteira'); return; }
  if (!date) { toast('Seleciona uma data'); return; }

  await api('POST', '/api/expenses', {
    user_id: S.user.id,
    wallet_id: S.selWltId,
    category_id: S.selCatId || null,
    amount,
    description: desc,
    date,
  });

  closeAddSheet();
  toast('Despesa guardada ✓');

  const ym = date.slice(0, 7);
  if (!S.selMonths.includes(ym)) { S.selMonths = [ym]; S.selWallet = ''; }
  await loadExpenses();
  renderFilters();
}

// ── Delete Sheet ──────────────────────────────────────────────────────────────
function openDelSheet(id, desc, amount) {
  S.deleteId = id;
  document.getElementById('del-desc').textContent = `"${desc}" — ${fmt(amount)}`;
  document.getElementById('ov-del').classList.add('active');
  document.getElementById('sh-del').classList.add('open');
}

function closeDelSheet() {
  document.getElementById('ov-del').classList.remove('active');
  document.getElementById('sh-del').classList.remove('open');
  S.deleteId = null;
}

async function confirmDelete() {
  if (!S.deleteId) return;
  await api('DELETE', `/api/expenses/${S.deleteId}`);
  closeDelSheet();
  toast('Despesa eliminada');
  await loadExpenses();
}

// ── Settings ──────────────────────────────────────────────────────────────────
function renderSettings() {
  document.getElementById('sett-name').value = S.user?.name || '';

  document.getElementById('wallets-list').innerHTML = S.wallets.map(w => `
    <div class="li">
      <div class="color-dot" style="background:${w.color}"></div>
      <div class="li-main"><div class="li-name">${escHtml(w.name)}</div></div>
      <button class="del-btn" onclick="deleteWallet(${w.id})">🗑</button>
    </div>`).join('');

  const gTag = g => `<span class="group-tag group-${g}">${{basic:'Basic',saving:'Saving',free:'Free'}[g]||g}</span>`;
  document.getElementById('cats-list').innerHTML = S.categories.map(c => `
    <div class="li">
      <span style="font-size:1.25rem">${c.icon}</span>
      <div class="li-main">
        <div class="li-name">${escHtml(c.name)}</div>
        <div class="li-sub">${gTag(c.group_type)}</div>
      </div>
      <button class="del-btn" onclick="deleteCategory(${c.id})">🗑</button>
    </div>`).join('');
}

async function saveUserName() {
  const name = document.getElementById('sett-name').value.trim();
  if (!name) return;
  await api('PUT', `/api/users/${S.user.id}`, { name });
  S.user.name = name;
  updateAvatar();
  toast('Nome guardado ✓');
}

async function addWallet() {
  const name = document.getElementById('new-wlt-name').value.trim();
  const color = document.getElementById('new-wlt-color').value;
  if (!name) { toast('Insere um nome'); return; }
  const w = await api('POST', '/api/wallets', { user_id: S.user.id, name, color });
  S.wallets.push(w);
  document.getElementById('new-wlt-name').value = '';
  renderSettings();
  renderFilters();
  toast('Carteira criada ✓');
}

async function deleteWallet(id) {
  if (S.wallets.length <= 1) { toast('Mantém pelo menos uma carteira'); return; }
  await api('DELETE', `/api/wallets/${id}`);
  S.wallets = S.wallets.filter(w => w.id !== id);
  renderSettings();
  renderFilters();
  toast('Carteira eliminada');
}

async function addCategory() {
  const icon = document.getElementById('new-cat-icon').value.trim() || '📦';
  const name = document.getElementById('new-cat-name').value.trim();
  const group_type = document.getElementById('new-cat-group').value;
  if (!name) { toast('Insere um nome'); return; }
  const c = await api('POST', '/api/categories', { user_id: S.user.id, name, icon, group_type });
  S.categories.push(c);
  document.getElementById('new-cat-icon').value = '';
  document.getElementById('new-cat-name').value = '';
  renderSettings();
  toast('Categoria criada ✓');
}

async function deleteCategory(id) {
  await api('DELETE', `/api/categories/${id}`);
  S.categories = S.categories.filter(c => c.id !== id);
  renderSettings();
  toast('Categoria eliminada');
}

// ── Budget ───────────────────────────────────────────────────────────────────
const GROUP_CFG = {
  basic:  { label:'Basic',  color:'#4f8ef7', desc:'Despesas essenciais' },
  saving: { label:'Saving', color:'#22c55e', desc:'Poupança e investimento' },
  free:   { label:'Free',   color:'#f59e0b', desc:'Lazer e extras' },
};

function loadLimits() {
  if (!S.user) return;
  const raw = localStorage.getItem(`budget_limits_${S.user.id}`);
  S.limits = raw ? JSON.parse(raw) : { basic: null, saving: null, free: null };
}

function saveLimits() {
  localStorage.setItem(`budget_limits_${S.user.id}`, JSON.stringify(S.limits));
}

async function renderBudget() {
  document.getElementById('budget-avatar').textContent = initials(S.user?.name || 'U');

  // Month chips (single select)
  const chips = document.getElementById('budget-month-chips');
  chips.innerHTML = '';
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const ym = d.toISOString().slice(0, 7);
    const chip = document.createElement('div');
    chip.className = 'chip' + (S.budgetMonth === ym ? ' active' : '');
    chip.textContent = labelMonth(ym);
    chip.onclick = () => { S.budgetMonth = ym; renderBudget(); };
    chips.appendChild(chip);
  }

  const exps = await api('GET', `/api/expenses?user_id=${S.user.id}&month=${S.budgetMonth}`);
  const total = exps.reduce((s, e) => s + e.amount, 0);

  // Aggregate by group and category
  const groups = { basic: 0, saving: 0, free: 0 };
  const byCat = {};
  for (const e of exps) {
    const g = e.group_type || 'basic';
    groups[g] = (groups[g] || 0) + e.amount;
    const ck = e.category_name || 'Sem categoria';
    if (!byCat[ck]) byCat[ck] = { icon: e.category_icon || '📦', group: g, total: 0 };
    byCat[ck].total += e.amount;
  }

  let html = '';

  // Summary card
  const monthFull = new Date(S.budgetMonth + '-01T00:00:00')
    .toLocaleDateString('pt-PT', { month:'long', year:'numeric' });
  html += `<div class="bgt-summary">
    <div style="font-size:.75rem;color:var(--muted);text-transform:capitalize;margin-bottom:6px">${monthFull}</div>
    <div style="font-size:2rem;font-weight:800;color:var(--danger);margin-bottom:10px">${fmt(total)}</div>
    <div style="display:flex;gap:4px">`;
  for (const [g, cfg] of Object.entries(GROUP_CFG)) {
    const v = groups[g] || 0;
    const pct = total > 0 ? Math.round((v / total) * 100) : 0;
    html += `<div style="flex:${pct || 1};height:6px;background:${cfg.color};border-radius:3px;opacity:${pct ? 1 : 0.15}"></div>`;
  }
  html += `</div><div style="display:flex;justify-content:space-between;margin-top:8px">`;
  for (const [g, cfg] of Object.entries(GROUP_CFG)) {
    const pct = total > 0 ? Math.round(((groups[g]||0) / total) * 100) : 0;
    html += `<div style="font-size:.72rem;color:${cfg.color};font-weight:600">${cfg.label} ${pct}%</div>`;
  }
  html += `</div></div>`;

  // Group cards
  html += `<div class="bgt-sec-title">Grupos</div>`;
  for (const [g, cfg] of Object.entries(GROUP_CFG)) {
    const spent = groups[g] || 0;
    const limit = S.limits[g];
    const pct = limit ? Math.min(100, (spent / limit) * 100) : null;
    const over = limit && spent > limit;
    const remaining = limit ? limit - spent : null;
    html += `<div class="bgt-card" onclick="openLimitSheet('${g}')">
      <div class="bgt-card-top">
        <div>
          <div class="bgt-card-label" style="color:${cfg.color}">${cfg.label}</div>
          <div class="bgt-card-desc">${cfg.desc}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;padding-left:10px">
          <div class="bgt-card-spent" style="color:${over ? 'var(--danger)' : 'var(--text)'}">${fmt(spent)}</div>
          <div class="bgt-card-limit">${limit ? `/ ${fmt(limit)}` : `Toca para definir limite`}</div>
        </div>
      </div>
      ${pct !== null ? `
        <div class="bgt-bar-bg"><div class="bgt-bar-fill" style="width:${pct}%;background:${over ? 'var(--danger)' : cfg.color}"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:.72rem;color:var(--muted)">
          <span>${Math.round(pct)}% usado</span>
          <span style="color:${over ? 'var(--danger)' : 'var(--ok)'};font-weight:600">
            ${over ? `+${fmt(Math.abs(remaining))} acima` : `${fmt(remaining)} disponível`}
          </span>
        </div>` : ''}
      ${pct === null && total > 0 ? `<div style="font-size:.72rem;color:var(--muted);margin-top:4px">${total > 0 ? Math.round(((groups[g]||0)/total)*100) : 0}% do total</div>` : ''}
    </div>`;
  }

  // Category breakdown
  const sortedCats = Object.entries(byCat).sort((a, b) => b[1].total - a[1].total);
  if (sortedCats.length) {
    html += `<div class="bgt-sec-title">Por categoria</div>
      <div style="background:var(--surface);border-radius:14px;padding:0 14px;border:1px solid var(--border)">`;
    for (const [name, data] of sortedCats) {
      const pctCat = total > 0 ? (data.total / total) * 100 : 0;
      const cfg = GROUP_CFG[data.group] || GROUP_CFG.basic;
      html += `<div class="cat-row">
        <div style="font-size:1.3rem;width:34px;text-align:center;flex-shrink:0;padding-top:2px">${data.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
            <span style="font-size:.9rem;font-weight:600">${escHtml(name)}</span>
            <span style="font-size:.9rem;font-weight:700;color:var(--danger);padding-left:8px;flex-shrink:0">${fmt(data.total)}</span>
          </div>
          <div class="bgt-bar-bg"><div class="bgt-bar-fill" style="width:${pctCat}%;background:${cfg.color}"></div></div>
          <div style="font-size:.7rem;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:6px">
            <span>${Math.round(pctCat)}%</span>
            <span class="group-tag group-${data.group}">${cfg.label}</span>
          </div>
        </div>
      </div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="empty-state"><div class="ei">📊</div>
      <p>Sem despesas em ${labelMonth(S.budgetMonth)}.<br>Regista despesas para ver o orçamento.</p></div>`;
  }

  document.getElementById('budget-content').innerHTML = html;
}

// ── Limit Sheet ───────────────────────────────────────────────────────────────
let _editingGroup = null;

function openLimitSheet(group) {
  _editingGroup = group;
  const cfg = GROUP_CFG[group];
  document.getElementById('limit-sheet-title').textContent = `Limite · ${cfg.label}`;
  document.getElementById('limit-amount').value = S.limits[group] != null ? S.limits[group] : '';
  document.getElementById('ov-limit').classList.add('active');
  document.getElementById('sh-limit').classList.add('open');
  setTimeout(() => document.getElementById('limit-amount').focus(), 320);
}

function closeLimitSheet() {
  document.getElementById('ov-limit').classList.remove('active');
  document.getElementById('sh-limit').classList.remove('open');
  _editingGroup = null;
}

function saveLimit() {
  const v = parseFloat(document.getElementById('limit-amount').value);
  S.limits[_editingGroup] = v > 0 ? v : null;
  saveLimits();
  closeLimitSheet();
  renderBudget();
  toast('Limite guardado ✓');
}

function clearLimit() {
  S.limits[_editingGroup] = null;
  saveLimits();
  closeLimitSheet();
  renderBudget();
  toast('Limite removido');
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
