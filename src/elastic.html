<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<title>Elasticsearch Export</title>
<style>
:root {
  --bg:#0f1117; --surface:#181b27; --surface2:#1f2336; --border:#2a2f4a;
  --accent:#4f8ef7; --text:#dde3f0; --muted:#7a849a;
  --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px}
body{padding:24px 16px 48px}

.page-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.page-header a{color:var(--muted);text-decoration:none;font-size:.9rem;display:flex;align-items:center;gap:6px}
.page-header a:hover{color:var(--text)}
.page-header h1{font-size:1.5rem;font-weight:800;color:var(--accent)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.card-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px}
.step-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  border-radius:50%;background:var(--accent);color:#fff;font-size:.75rem;font-weight:700;margin-right:8px}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-row.single{grid-template-columns:1fr}
.field-row.trio{grid-template-columns:1fr 1fr 1fr}
.field-group label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;font-weight:600}
.inp{width:100%;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:.93rem;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
select.inp{cursor:pointer;appearance:none;-webkit-appearance:none}

.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;background:var(--accent);
  color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:default}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-ok{background:var(--ok)}
.btn-warn{background:var(--warn);color:#0f1117}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

.status-box{border-radius:10px;padding:12px 14px;font-size:.88rem;font-weight:600;display:none}
.status-box.show{display:block}
.status-box.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:var(--ok)}
.status-box.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:var(--danger)}
.status-box.info{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--accent)}
.status-box.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--warn)}

.section-disabled{opacity:.4;pointer-events:none;user-select:none}

.indices-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;max-height:160px;overflow-y:auto}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 11px;
  font-size:.8rem;cursor:pointer;transition:all .15s;user-select:none}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.tag.selected{background:var(--accent);border-color:var(--accent);color:#fff}

.preview-wrap{overflow-x:auto;margin-top:14px;border-radius:10px;border:1px solid var(--border)}
.preview-table{border-collapse:collapse;width:100%;font-size:.8rem;min-width:600px}
.preview-table th{background:var(--surface2);padding:8px 10px;text-align:left;
  font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.preview-table td{padding:7px 10px;border-bottom:1px solid var(--border);
  max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.preview-table tr:last-child td{border-bottom:none}
.preview-table tr:hover td{background:var(--surface2)}

.progress-bar-wrap{display:none;margin-top:12px}
.progress-bar-wrap.show{display:block}
.progress-bar-bg{background:var(--surface2);border-radius:999px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .3s;width:0%}
.progress-label{font-size:.8rem;color:var(--muted);margin-top:6px;text-align:center}

.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid transparent;
  border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.ssl-toggle{display:flex;align-items:center;gap:8px;margin-top:8px;cursor:pointer;width:fit-content}
.ssl-toggle input{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
.ssl-toggle span{font-size:.82rem;color:var(--muted)}

.auth-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:.83rem;font-weight:600;cursor:pointer;
  background:var(--surface2);color:var(--muted);border:none;transition:all .15s}
.auth-tab.active{background:var(--accent);color:#fff}

.total-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(79,142,247,.12);
  border:1px solid rgba(79,142,247,.3);border-radius:8px;padding:5px 12px;
  font-size:.85rem;color:var(--accent);font-weight:700;margin-top:10px}

@media(max-width:500px){
  .field-row{grid-template-columns:1fr}
  .field-row.trio{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="page-header">
  <a href="/budget">← App</a>
  <h1>Elasticsearch Export</h1>
</div>

<!-- ── Step 1: Connection ── -->
<div class="card" id="card-conn">
  <div class="card-title"><span class="step-badge">1</span>Ligação</div>

  <div class="auth-tabs">
    <button class="auth-tab active" onclick="setAuthMode('basic')">User / Password</button>
    <button class="auth-tab" onclick="setAuthMode('apikey')">API Key</button>
  </div>

  <div class="field-row single">
    <div class="field-group">
      <label>URL do Elasticsearch / Kibana</label>
      <input id="es-host" class="inp" type="url" placeholder="https://mykibana.exemplo.com:9200">
    </div>
  </div>

  <div id="auth-basic">
    <div class="field-row">
      <div class="field-group">
        <label>Utilizador</label>
        <input id="es-user" class="inp" type="text" placeholder="elastic" autocomplete="username">
      </div>
      <div class="field-group">
        <label>Password</label>
        <input id="es-pass" class="inp" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>
  </div>

  <div id="auth-apikey" style="display:none">
    <div class="field-row single">
      <div class="field-group">
        <label>API Key (base64 ou id:key)</label>
        <input id="es-apikey" class="inp" type="password" placeholder="VnVhQ2ZHY0JDZGJjZXRhTVpYUVo6aDdWM3..." autocomplete="off">
      </div>
    </div>
  </div>

  <label class="ssl-toggle">
    <input type="checkbox" id="es-ssl-verify" checked>
    <span>Verificar certificado SSL</span>
  </label>

  <div class="btn-group">
    <button class="btn" onclick="testConnection()" id="btn-test">
      <span class="spinner" id="spin-test" style="display:none"></span>
      Testar Ligação
    </button>
  </div>

  <div class="status-box" id="conn-status"></div>
</div>

<!-- ── Step 2: Query ── -->
<div class="card section-disabled" id="card-query">
  <div class="card-title"><span class="step-badge">2</span>Configurar Query</div>

  <div class="field-group" style="margin-bottom:12px">
    <label>Índice / Padrão (ex: logs-*, metrics-2026-*)</label>
    <input id="es-index" class="inp" type="text" placeholder="*" value="*">
  </div>

  <div class="field-group" style="margin-bottom:6px">
    <label>Índices disponíveis (clica para selecionar)</label>
    <div class="indices-list" id="indices-list">
      <span style="color:var(--muted);font-size:.8rem">Testa a ligação para carregar índices…</span>
    </div>
  </div>

  <div class="field-row" style="margin-top:12px">
    <div class="field-group">
      <label>Campo de data</label>
      <input id="es-date-field" class="inp" type="text" placeholder="@timestamp" value="@timestamp">
    </div>
    <div class="field-group">
      <label>Máximo de registos</label>
      <input id="es-max" class="inp" type="number" placeholder="10000" value="10000" min="1" max="1000000">
    </div>
  </div>

  <div class="field-row">
    <div class="field-group">
      <label>Data início</label>
      <input id="es-from" class="inp" type="datetime-local">
    </div>
    <div class="field-group">
      <label>Data fim</label>
      <input id="es-to" class="inp" type="datetime-local">
    </div>
  </div>

  <div class="field-group" style="margin-bottom:12px">
    <label>Filtro extra (Lucene Query, opcional)</label>
    <input id="es-query-str" class="inp" type="text" placeholder='status:error AND host:"server-01"'>
  </div>

  <div class="btn-group">
    <button class="btn btn-outline" onclick="previewData()" id="btn-preview">
      <span class="spinner" id="spin-preview" style="display:none"></span>
      Pré-visualizar (5 linhas)
    </button>
  </div>

  <div class="status-box" id="query-status"></div>
  <div class="total-badge" id="total-badge" style="display:none">
    <span>📊</span><span id="total-count">0</span> documentos encontrados
  </div>

  <div class="preview-wrap" id="preview-wrap" style="display:none">
    <table class="preview-table" id="preview-table">
      <thead id="preview-thead"></thead>
      <tbody id="preview-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ── Step 3: Export ── -->
<div class="card section-disabled" id="card-export">
  <div class="card-title"><span class="step-badge">3</span>Exportar</div>

  <div class="field-row">
    <div class="field-group">
      <label>Formato</label>
      <select id="es-format" class="inp">
        <option value="csv">CSV</option>
        <option value="json">JSON</option>
        <option value="ndjson">NDJSON (1 linha por doc)</option>
      </select>
    </div>
    <div class="field-group">
      <label>Aplanar campos aninhados</label>
      <select id="es-flatten" class="inp">
        <option value="yes">Sim (recomendado para CSV)</option>
        <option value="no">Não</option>
      </select>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-ok" onclick="startDownload()" id="btn-download">
      <span class="spinner" id="spin-download" style="display:none"></span>
      ⬇ Descarregar
    </button>
  </div>

  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">A exportar…</div>
  </div>

  <div class="status-box" id="export-status"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let authMode = 'basic';
let connected = false;

function setAuthMode(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('auth-basic').style.display = mode === 'basic' ? '' : 'none';
  document.getElementById('auth-apikey').style.display = mode === 'apikey' ? '' : 'none';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = `status-box show ${type}`;
  el.textContent = msg;
}
function hideStatus(id) {
  document.getElementById(id).className = 'status-box';
}
function setLoading(spinId, btnId, loading) {
  document.getElementById(spinId).style.display = loading ? 'inline-block' : 'none';
  document.getElementById(btnId).disabled = loading;
}
function enableSection(cardId) {
  document.getElementById(cardId).classList.remove('section-disabled');
}

function getConnPayload() {
  return {
    host: document.getElementById('es-host').value.trim(),
    auth_mode: authMode,
    username: document.getElementById('es-user').value.trim(),
    password: document.getElementById('es-pass').value,
    api_key: document.getElementById('es-apikey').value.trim(),
    ssl_verify: document.getElementById('es-ssl-verify').checked,
    index: document.getElementById('es-index').value.trim() || '*',
    date_field: document.getElementById('es-date-field').value.trim() || '@timestamp',
    date_from: document.getElementById('es-from').value ? document.getElementById('es-from').value + ':00' : '',
    date_to: document.getElementById('es-to').value ? document.getElementById('es-to').value + ':00' : '',
    query_string: document.getElementById('es-query-str').value.trim(),
    max_records: parseInt(document.getElementById('es-max').value) || 10000,
    format: document.getElementById('es-format').value,
    flatten: document.getElementById('es-flatten').value === 'yes',
  };
}

// ── Test Connection ────────────────────────────────────────────────────────
async function testConnection() {
  hideStatus('conn-status');
  setLoading('spin-test', 'btn-test', true);

  try {
    const payload = getConnPayload();
    if (!payload.host) { showStatus('conn-status', 'err', 'Introduz o URL do Elasticsearch.'); return; }

    const res = await fetch('/api/elastic/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (!res.ok) {
      showStatus('conn-status', 'err', `Erro: ${data.error || res.statusText}`);
      return;
    }

    showStatus('conn-status', 'ok', `✓ Ligado! Cluster: ${data.cluster_name || 'N/D'} — Elasticsearch ${data.version || ''}`);
    connected = true;
    enableSection('card-query');
    enableSection('card-export');
    loadIndices(payload);
  } catch (e) {
    showStatus('conn-status', 'err', `Erro de rede: ${e.message}`);
  } finally {
    setLoading('spin-test', 'btn-test', false);
  }
}

// ── Load Indices ───────────────────────────────────────────────────────────
async function loadIndices(payload) {
  const container = document.getElementById('indices-list');
  container.innerHTML = '<span style="color:var(--muted);font-size:.8rem"><span class="spinner" style="display:inline-block;width:12px;height:12px;border-width:2px"></span> A carregar índices…</span>';

  try {
    const res = await fetch('/api/elastic/indices', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok || !data.indices) { container.innerHTML = '<span style="color:var(--muted);font-size:.8rem">Não foi possível carregar índices.</span>'; return; }

    container.innerHTML = '';
    const indices = data.indices.slice(0, 80); // limit display
    indices.forEach(idx => {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.textContent = idx;
      tag.onclick = () => {
        container.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
        tag.classList.add('selected');
        document.getElementById('es-index').value = idx;
      };
      container.appendChild(tag);
    });
    if (data.indices.length > 80) {
      const more = document.createElement('span');
      more.style.cssText = 'color:var(--muted);font-size:.78rem;align-self:center';
      more.textContent = `+${data.indices.length - 80} mais…`;
      container.appendChild(more);
    }
  } catch (e) {
    container.innerHTML = '<span style="color:var(--muted);font-size:.8rem">Erro ao carregar índices.</span>';
  }
}

// ── Preview ────────────────────────────────────────────────────────────────
async function previewData() {
  hideStatus('query-status');
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('total-badge').style.display = 'none';
  setLoading('spin-preview', 'btn-preview', true);

  try {
    const payload = { ...getConnPayload(), preview: true, max_records: 5 };
    const res = await fetch('/api/elastic/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) { showStatus('query-status', 'err', data.error || 'Erro na query'); return; }

    const total = data.total;
    document.getElementById('total-count').textContent = total.toLocaleString('pt-PT');
    document.getElementById('total-badge').style.display = 'inline-flex';

    if (data.hits && data.hits.length > 0) {
      renderPreview(data.hits);
    } else {
      showStatus('query-status', 'warn', 'Nenhum documento encontrado para os filtros selecionados.');
    }
  } catch (e) {
    showStatus('query-status', 'err', `Erro: ${e.message}`);
  } finally {
    setLoading('spin-preview', 'btn-preview', false);
  }
}

function renderPreview(hits) {
  const allKeys = new Set(['_id', '_index']);
  hits.forEach(h => { Object.keys(h._source || {}).forEach(k => allKeys.add(k)); });
  const cols = ['_id', '_index', ...Array.from(allKeys).filter(k => k !== '_id' && k !== '_index').slice(0, 8)];

  const thead = document.getElementById('preview-thead');
  const tbody = document.getElementById('preview-tbody');
  thead.innerHTML = '<tr>' + cols.map(c => `<th>${escHtml(c)}</th>`).join('') + '</tr>';
  tbody.innerHTML = hits.map(h => {
    const src = h._source || {};
    return '<tr>' + cols.map(c => {
      const val = c === '_id' ? h._id : c === '_index' ? h._index : (src[c] ?? '');
      const disp = typeof val === 'object' ? JSON.stringify(val) : String(val ?? '');
      return `<td title="${escHtml(disp)}">${escHtml(disp.slice(0, 80))}</td>`;
    }).join('') + '</tr>';
  }).join('');

  document.getElementById('preview-wrap').style.display = '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Download ──────────────────────────────────────────────────────────────
async function startDownload() {
  hideStatus('export-status');
  const progressWrap = document.getElementById('progress-wrap');
  const progressFill = document.getElementById('progress-fill');
  const progressLabel = document.getElementById('progress-label');

  progressWrap.classList.add('show');
  progressFill.style.width = '5%';
  progressLabel.textContent = 'A contactar servidor…';
  setLoading('spin-download', 'btn-download', true);

  try {
    const payload = getConnPayload();
    if (!payload.host) { showStatus('export-status', 'err', 'Introduz o URL do Elasticsearch.'); return; }

    progressFill.style.width = '20%';
    progressLabel.textContent = 'A executar query e a exportar dados…';

    const res = await fetch('/api/elastic/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      showStatus('export-status', 'err', `Erro: ${err.error || res.statusText}`);
      return;
    }

    progressFill.style.width = '80%';
    progressLabel.textContent = 'A preparar ficheiro…';

    const blob = await res.blob();
    const fmt = payload.format;
    const ext = fmt === 'json' ? 'json' : fmt === 'ndjson' ? 'ndjson' : 'csv';
    const ts = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
    const filename = `elastic_${payload.index.replace(/[*\/]/g, '_')}_${ts}.${ext}`;

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    progressFill.style.width = '100%';
    progressLabel.textContent = `Download concluído: ${filename}`;
    showStatus('export-status', 'ok', `✓ Ficheiro "${filename}" descarregado com sucesso.`);
  } catch (e) {
    showStatus('export-status', 'err', `Erro: ${e.message}`);
  } finally {
    setLoading('spin-download', 'btn-download', false);
  }
}
</script>
</body>
</html>
